command = "cd"
extends = ["z", "__zoxide_z", "Set-Location"]

[[match_err]]
suggest = [
'''
#[INLINE, length(2)]
{{command[0]}} {{typo[1](file)}} ''',
'''
#[FUNCTION, INLINE, min_length(2)]
ZoxideIntegration ''',
'''
#[!shell(nu), length(2)]
mkdir --parents {{command[1]}} &&
cd {{command[1]}} ''',
'''
#[shell(nu), length(2)]
mkdir {{command[1]}} and \
cd {{command[1]}} '''
]
